<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login - Janeth's Business</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0f2c33 0%, #1a4d5f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
            width: 100%;
            max-width: 440px;
            padding: 2rem 1.8rem 2.2rem;
            transition: transform 0.2s ease;
        }

        .login-card:hover {
            transform: translateY(-4px);
        }

        .logo {
            text-align: center;
            margin-bottom: 1rem;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1a4d5f, #0a7e8c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .sub {
            text-align: center;
            color: #5e6f8d;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.4rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 1.2rem;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: #fefefe;
        }

        .input-group input:focus {
            outline: none;
            border-color: #0a7e8c;
            box-shadow: 0 0 0 3px rgba(10, 126, 140, 0.2);
        }

        button {
            width: 100%;
            background: #0a7e8c;
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            background: #085e68;
            transform: scale(1.01);
        }

        .error-message {
            color: #e53e3e;
            background: #fff5f5;
            border-left: 4px solid #e53e3e;
            padding: 0.7rem;
            border-radius: 0.8rem;
            margin-top: 1rem;
            font-size: 0.8rem;
            display: none;
        }

        .demo {
            margin-top: 2rem;
            background: #f8fafc;
            border-radius: 1rem;
            padding: 1rem;
            font-size: 0.75rem;
            color: #4a5568;
            border: 1px solid #e2e8f0;
        }

        .demo strong {
            color: #0a7e8c;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <h1>📦 Janeth's Business</h1>
    </div>
    <div class="sub">Inventory & Sales · Secure Login</div>

    <form id="loginForm">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="admin or staff1" required autofocus>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••" required>
        </div>
        <button type="submit">→ Sign in</button>
        <div id="errorMsg" class="error-message"></div>
    </form>

    <div class="demo">
        <strong>Demo access</strong><br>
        👑 Admin: admin / admin123 &nbsp;|&nbsp;
        👤 Staff: staff1 / staff123
    </div>
</div>

<script>
    const API_BASE = window.location.origin + '/Janeth_Business/Janeth-Chicken-Business/backend/login.php';
    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        errorDiv.style.display = 'none';

        try {
            const response = await fetch(API_BASE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            if (data.success) {
                window.location.href = 'janeth-input.php';
            } else {
                errorDiv.textContent = data.message || 'Invalid credentials';
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.textContent = 'Network error. Is the server running?';
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
