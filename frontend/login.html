<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login · Janeth's Business</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b24;
            --surface-2: #1e2633;
            --surface-3: #252d3a;
            --border: rgba(255,255,255,0.07);
            --accent: #f5a623;
            --accent-dim: rgba(245,166,35,0.12);
            --accent-glow: rgba(245,166,35,0.3);
            --teal: #29b6c8;
            --teal-dim: rgba(41,182,200,0.1);
            --teal-glow: rgba(41,182,200,0.25);
            --text: #e8edf5;
            --text-muted: #6b7a93;
            --text-faint: #3d4d63;
            --danger: #f87171;
            --danger-dim: rgba(248,113,113,0.1);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background-image:
                radial-gradient(ellipse 70% 60% at 15% 0%, rgba(41,182,200,0.1) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 85% 100%, rgba(245,166,35,0.07) 0%, transparent 55%),
                radial-gradient(ellipse 40% 30% at 80% 10%, rgba(41,182,200,0.04) 0%, transparent 50%);
        }

        /* Decorative grid lines */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2.25rem 2rem;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 32px 64px -16px rgba(0,0,0,0.6),
                0 0 80px -20px rgba(41,182,200,0.08);
            animation: fadeUp 0.4s cubic-bezier(0.34,1.2,0.64,1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        /* Top accent line */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--teal), transparent);
            border-radius: 1px;
        }

        /* ── Branding ── */
        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--teal), #1a9aab);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 6px 24px var(--teal-glow);
            margin-bottom: 0.25rem;
        }

        .brand-name {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.03em;
        }

        .brand-sub {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ── Form ── */
        .field {
            margin-bottom: 1rem;
        }

        .field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.45rem;
        }

        .field input {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'Sora', sans-serif;
            font-size: 0.88rem;
            padding: 0.75rem 1rem;
            outline: none;
            transition: all 0.18s ease;
        }

        .field input::placeholder { color: var(--text-faint); }

        .field input:focus {
            border-color: var(--teal);
            background: rgba(41,182,200,0.04);
            box-shadow: 0 0 0 3px var(--teal-dim);
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--teal), #1a9aab);
            color: #0d1117;
            border: none;
            padding: 0.85rem;
            border-radius: 50px;
            font-family: 'Sora', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.18s ease;
            margin-top: 0.5rem;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 18px var(--teal-glow);
        }

        .submit-btn:hover {
            box-shadow: 0 8px 28px rgba(41,182,200,0.4);
            transform: translateY(-1px);
        }

        .submit-btn:active { transform: translateY(0); }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Error */
        .error-msg {
            display: none;
            align-items: center;
            gap: 0.5rem;
            background: var(--danger-dim);
            border: 1px solid rgba(248,113,113,0.2);
            border-radius: var(--radius-sm);
            padding: 0.7rem 0.9rem;
            margin-top: 0.9rem;
            font-size: 0.78rem;
            color: var(--danger);
            font-weight: 500;
        }

        .error-msg.show { display: flex; }

        /* Demo credentials */
        .demo {
            margin-top: 1.75rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.9rem 1rem;
            text-align: center;
        }

        .demo-title {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-faint);
            margin-bottom: 0.6rem;
        }

        .demo-creds {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            flex-wrap: wrap;
        }

        .cred {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .cred-role {
            font-size: 0.65rem;
            color: var(--text-faint);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .cred-value {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--teal);
            font-weight: 500;
        }

        .divider {
            width: 1px;
            background: var(--border);
            align-self: stretch;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">
        <div class="brand-icon">📦</div>
        <span class="brand-name">Janeth's Business</span>
        <span class="brand-sub">Inventory & Sales · Secure Login</span>
    </div>

    <form id="loginForm">
        <div class="field">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username" required autofocus autocomplete="username">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Sign in →</button>
        <div id="errorMsg" class="error-msg">
            <span>⚠️</span><span id="errorText"></span>
        </div>
    </form>

    <div class="demo">
        <div class="demo-title">Demo Access</div>
        <div class="demo-creds">
            <div class="cred">
                <span class="cred-role">👑 Admin</span>
                <span class="cred-value">admin / admin123</span>
            </div>
            <div class="divider"></div>
            <div class="cred">
                <span class="cred-role">👤 Staff</span>
                <span class="cred-value">staff1 / staff123</span>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin + '/Janeth_Business/Janeth-Chicken-Business/backend/login.php';
    const form      = document.getElementById('loginForm');
    const errorDiv  = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const submitBtn = document.getElementById('submitBtn');

    function showError(msg) {
        errorText.textContent = msg;
        errorDiv.classList.add('show');
    }

    function hideError() {
        errorDiv.classList.remove('show');
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in…';

        try {
            const res  = await fetch(API_BASE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                submitBtn.textContent = '✓ Success';
                window.location.href = 'janeth-input.php';
            } else {
                showError(data.message || 'Invalid credentials. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign in →';
            }
        } catch {
            showError('Network error. Is the server running?');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign in →';
        }
    });

    // Hide error on input
    document.getElementById('username').addEventListener('input', hideError);
    document.getElementById('password').addEventListener('input', hideError);
</script>
</body>
</html>
