<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janeth – Dashboard</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 2rem 1rem; }
        .container { max-width: 1300px; margin: 0 auto; background: white; border-radius: 24px; padding: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        h1 { margin: 0 0 0.25rem; color: #1a4d5f; }
        .summary-cards { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1.5rem 0; }
        .card { background: #e9f0f2; padding: 1rem 1.5rem; border-radius: 20px; flex: 1; min-width: 150px; text-align: center; }
        .card h3 { margin: 0; font-size: 0.9rem; font-weight: normal; color: #2c5a66; }
        .card .number { font-size: 2rem; font-weight: bold; margin: 0.5rem 0 0; color: #0a7e8c; }
        table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; }
        th, td { border: 1px solid #dee2e6; padding: 10px 6px; text-align: center; }
        th { background: #f8f9fa; }
        .date-selector { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
        select, button, input { padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #0a7e8c; color: white; border: none; cursor: pointer; }
        button:hover { background: #085e68; }
        .btn-outline { background: white; color: #0a7e8c; border: 1px solid #0a7e8c; }
        .back-link { margin-top: 1rem; display: inline-block; }
        .loading, .error { text-align: center; padding: 2rem; color: #6c757d; }
        .error { color: #d32f2f; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Janeth – Dashboard</h1>
    <p>View and analyze saved inventory & sales records</p>

    <div class="date-selector">
        <label>📅 Select date:</label>
        <select id="dateSelect">
            <option value="">Loading dates...</option>
        </select>
        <button id="loadDashboardBtn">Load</button>
        <a href="janeth-input.html"><button type="button" class="btn-outline">✏️ Go to Entry</button></a>
    </div>

    <div class="summary-cards" id="summaryCards">
        <div class="card"><h3>Total Distributed</h3><div class="number" id="totalDistributed">0</div></div>
        <div class="card"><h3>Total Sold</h3><div class="number" id="totalSold">0</div></div>
        <div class="card"><h3>Total Unsold</h3><div class="number" id="totalUnsold">0</div></div>
        <div class="card"><h3>Total Remaining</h3><div class="number" id="totalRemaining">0</div></div>
    </div>

    <div style="overflow-x: auto;">
        <table id="dashboardTable">
            <thead>
                <tr><th>Product</th><th>Yesterday</th><th>Stock In</th><th>Distributed</th><th>Sold</th><th>Unsold</th><th>Remaining</th></tr>
            </thead>
            <tbody id="dashboardBody">
                <tr><td colspan="7">Select a date and click Load</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Helper to show error message in the table
    function showError(message) {
        const tbody = document.getElementById('dashboardBody');
        tbody.innerHTML = `<tr><td colspan="7" style="color: #d32f2f;">⚠️ ${message}</td></tr>`;
        // Reset totals
        document.getElementById('totalDistributed').innerText = '0';
        document.getElementById('totalSold').innerText = '0';
        document.getElementById('totalUnsold').innerText = '0';
        document.getElementById('totalRemaining').innerText = '0';
    }

    // Load the list of available dates from the backend
    async function loadDateSelector() {
        const select = document.getElementById('dateSelect');
        select.innerHTML = '<option value="">Loading dates...</option>';
        try {
            const response = await fetch('../backend/janeth.php?list_dates=1');
            if (!response.ok) throw new Error('HTTP ' + response.status);
            const data = await response.json();
            if (data.dates && data.dates.length > 0) {
                select.innerHTML = '';
                data.dates.forEach(date => {
                    const option = document.createElement('option');
                    option.value = date;
                    option.textContent = date;
                    select.appendChild(option);
                });
                // Optionally auto-load the most recent date (first one)
                if (data.dates.length > 0) {
                    select.value = data.dates[0];
                    loadDashboard();
                }
            } else {
                select.innerHTML = '<option value="">No saved data yet</option>';
                showError('No records found. Go to Entry page to add data.');
            }
        } catch (err) {
            console.error(err);
            select.innerHTML = '<option value="">Error loading dates</option>';
            showError('Failed to load dates from server. Is the backend running?');
        }
    }

    // Load and display the dashboard for the selected date
    async function loadDashboard() {
        const date = document.getElementById('dateSelect').value;
        if (!date || date === '') {
            showError('Please select a valid date');
            return;
        }

        const tbody = document.getElementById('dashboardBody');
        tbody.innerHTML = '<tr><td colspan="7">Loading data...</td></tr>';

        try {
            const response = await fetch(`../backend/janeth.php?date=${date}`);
            if (!response.ok) throw new Error('HTTP ' + response.status);
            const data = await response.json();

            if (!data.records || data.records.length === 0) {
                showError(`No records found for ${date}`);
                return;
            }

            // Process records
            let totalDist = 0, totalSold = 0, totalUnsold = 0, totalRemaining = 0;
            const rowsHtml = data.records.map(rec => {
                const totalStock = rec.yesterday_qty + rec.stock_in;
                const remaining = totalStock - rec.distributed;
                const unsold = rec.distributed - rec.sold;
                totalDist += rec.distributed;
                totalSold += rec.sold;
                totalUnsold += unsold;
                totalRemaining += remaining;

                return `<tr>
                            <td>${escapeHtml(rec.product_name)}</td>
                            <td>${rec.yesterday_qty}</td>
                            <td>${rec.stock_in}</td>
                            <td>${rec.distributed}</td>
                            <td>${rec.sold}</td>
                            <td>${unsold}</td>
                            <td>${remaining}</td>
                        </tr>`;
            }).join('');

            tbody.innerHTML = rowsHtml;
            document.getElementById('totalDistributed').innerText = totalDist;
            document.getElementById('totalSold').innerText = totalSold;
            document.getElementById('totalUnsold').innerText = totalUnsold;
            document.getElementById('totalRemaining').innerText = totalRemaining;

        } catch (err) {
            console.error(err);
            showError('Failed to load data from server');
        }
    }

    // Simple escape to prevent XSS (product names from DB are safe, but just in case)
    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event listeners
    document.getElementById('loadDashboardBtn').addEventListener('click', loadDashboard);

    // Initialize
    loadDateSelector();
</script>
</body>
</html>
